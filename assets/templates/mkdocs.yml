site_name: "{{PROJECT_NAME}} - Feature Docs"
site_description: "Product and engineering documentation"
docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search:
      lang: en

nav:
  - Home:
    - index.md
    - Project Brief: PROJECT_BRIEF.md
    - Architecture: ARCHITECTURE.md
    - Glossary: GLOSSARY.md
    - Decisions (ADR): DECISIONS.md
    - Roadmap: ROADMAP.md
    - Backlog: BACKLOG.md

  - Non-Functional Requirements: nfr/NON_FUNCTIONAL.md

  - Features:
    - Index: features/INDEX.md

  - Reports:
    - Index: reports/README.md
